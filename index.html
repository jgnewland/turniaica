<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turni Idrici — Consulta la tua zona</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1d6fa4;--blue-d:#155a85;--blue-l:#e8f4fd;--blue-xl:#f0f8ff;
  --green:#0e9a6e;--green-l:#e6f7f2;
  --amber:#d4890a;--amber-l:#fef7e6;
  --red:#c0392b;--red-l:#fdf0ee;
  --grey:#f4f6f9;--bord:#dde3ec;--bord2:#c5cdd8;
  --txt:#1a2433;--txt2:#4a5568;--txt3:#8a96a8;
  --surf:#ffffff;
  --r:10px;--r-sm:6px;--r-lg:14px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--grey);color:var(--txt);font-size:15px;line-height:1.6;min-height:100vh}

/* HEADER */
header{background:var(--blue);color:#fff;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-inner{max-width:960px;margin:0 auto;height:60px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;color:#fff;text-decoration:none}
.logo-drop{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.header-sep{flex:1}
.header-date{font-size:13px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:6px}
.btn-tecnici{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:.15s;font-family:inherit}
.btn-tecnici:hover{background:rgba(255,255,255,.25)}

/* HERO */
.hero{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-d) 100%);color:#fff;padding:40px 20px 0}
.hero-inner{max-width:960px;margin:0 auto}
.hero h1{font-size:28px;font-weight:800;margin-bottom:8px}
.hero p{font-size:16px;color:rgba(255,255,255,.8);margin-bottom:28px}

/* SEARCH BOX */
.search-box{background:#fff;border-radius:var(--r-lg) var(--r-lg) 0 0;padding:20px;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.search-row{display:flex;gap:10px;flex-wrap:wrap}
.search-input{flex:1;min-width:220px;background:var(--grey);border:1px solid var(--bord);border-radius:var(--r-sm);padding:11px 14px;font-size:14px;font-family:inherit;color:var(--txt);outline:none;transition:.15s}
.search-input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(29,111,164,.1)}
.search-select{background:var(--grey);border:1px solid var(--bord);border-radius:var(--r-sm);padding:11px 14px;font-size:14px;font-family:inherit;color:var(--txt);outline:none;cursor:pointer;min-width:160px}
.search-select:focus{border-color:var(--blue)}
.tgroup{display:flex;border:1px solid var(--bord);border-radius:var(--r-sm);overflow:hidden}
.tbtn{padding:10px 18px;background:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;color:var(--txt2);font-family:inherit;transition:.15s}
.tbtn:first-child{border-right:1px solid var(--bord)}
.tbtn.active{background:var(--blue);color:#fff}
.tbtn:hover:not(.active){background:var(--grey)}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:0 20px 60px}
.content-card{background:#fff;border-radius:0 0 var(--r-lg) var(--r-lg);border:1px solid var(--bord);border-top:none;padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}

/* STATO OGGI */
.oggi-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:gap}
.oggi-title{font-size:16px;font-weight:700;color:var(--txt)}
.oggi-sub{font-size:13px;color:var(--txt3);margin-top:2px}

/* COMUNE SECTION */
.comune-section{margin-bottom:24px}
.comune-title{display:flex;align-items:center;gap:10px;padding:12px 0 10px;border-bottom:2px solid var(--blue-l);margin-bottom:12px}
.comune-title h2{font-size:17px;font-weight:800;color:var(--blue)}
.comune-badge{background:var(--blue-l);color:var(--blue);font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}

/* SERBATOIO */
.serb-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);margin:12px 0 6px;display:flex;align-items:center;gap:6px}
.serb-label::before{content:'';display:inline-block;width:3px;height:12px;background:var(--blue);border-radius:2px}

/* TURNO CARD */
.turno-list{display:flex;flex-direction:column;gap:8px}
.turno-card{border:1px solid var(--bord);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px;background:#fff;transition:.15s}
.turno-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(29,111,164,.1)}
.tc-badge{min-width:52px;height:52px;border-radius:var(--r-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;line-height:1.2}
.tc-badge.sched{background:var(--blue-l);color:var(--blue)}
.tc-badge.h24{background:var(--green-l);color:var(--green)}
.tc-badge.guasto{background:var(--red-l);color:var(--red)}
.tc-badge.sospeso{background:var(--amber-l);color:var(--amber)}
.tc-badge .tc-icon{font-size:20px;margin-bottom:2px}
.tc-info{flex:1;min-width:0}
.tc-zona{font-size:14px;font-weight:700;color:var(--txt)}
.tc-desc{font-size:12px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-note{font-size:12px;color:var(--amber);margin-top:4px;display:flex;align-items:center;gap:4px}
.tc-right{text-align:right;flex-shrink:0}
.tc-orario{font-size:16px;font-weight:800;color:var(--txt);white-space:nowrap}
.tc-date{font-size:11px;color:var(--txt3);margin-top:2px}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.pill-sched{background:var(--blue-l);color:var(--blue)}
.pill-h24{background:var(--green-l);color:var(--green)}
.pill-guasto{background:var(--red-l);color:var(--red)}
.pill-sospeso{background:var(--amber-l);color:var(--amber)}

/* SETTIMANA GRID */
.week-grid{overflow-x:auto}
.wg-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.wg-table th{background:var(--blue);color:#fff;padding:9px 10px;text-align:center;font-size:12px;font-weight:700}
.wg-table th:first-child{text-align:left;padding-left:14px;min-width:180px;background:var(--blue-d)}
.wg-table td{padding:8px 10px;border-bottom:1px solid var(--bord);vertical-align:middle;text-align:center}
.wg-table td:first-child{text-align:left;font-size:12px;font-weight:600;color:var(--txt2);padding-left:14px;background:var(--grey)}
.wg-table tr:last-child td{border-bottom:none}
.wg-table tr:hover td{background:var(--blue-xl)}
.wg-table tr:hover td:first-child{background:var(--blue-l)}
.wg-chip{display:inline-block;padding:3px 8px;border-radius:var(--r-sm);font-size:11px;font-weight:700;white-space:nowrap}
.wg-serb-row td{background:var(--grey);font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.05em;text-transform:uppercase;padding:6px 14px;border-bottom:1px solid var(--bord)}
.th-today{background:rgba(255,255,255,.25)!important}
.td-today{background:var(--blue-xl)!important}

/* EMPTY / LOADER */
.empty{text-align:center;padding:50px 20px;color:var(--txt3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:15px}
.loader{text-align:center;padding:40px;color:var(--txt3)}
.spinner{width:32px;height:32px;border:3px solid var(--bord);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* INFO STRIP */
.info-strip{background:var(--blue-l);border:1px solid rgba(29,111,164,.2);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--blue);display:flex;align-items:center;gap:8px}

/* LEGENDA */
.legenda{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid var(--bord)}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2)}
.leg-dot{width:10px;height:10px;border-radius:50%}

/* FOOTER */
footer{background:var(--blue-d);color:rgba(255,255,255,.6);text-align:center;padding:20px;font-size:12px}
footer a{color:rgba(255,255,255,.5);text-decoration:none;margin-left:16px;font-size:11px}
footer a:hover{color:#fff}

/* RESPONSIVE */
@media(max-width:600px){
  .hero h1{font-size:22px}
  .search-row{flex-direction:column}
  .tgroup{width:100%}
  .tbtn{flex:1;text-align:center}
  .tc-badge{min-width:44px;height:44px}
  .header-date{display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-drop">💧</div>
      Turni Idrici
    </a>
    <div class="header-sep"></div>
    <div class="header-date">📅 <span id="hdate"></span></div>
    <a class="btn-tecnici" href="turni_editor_finale.html" title="Accesso riservato al personale tecnico">🔧 Tecnici</a>
  </div>
</header>

<!-- HERO + SEARCH -->
<div class="hero">
  <div class="hero-inner">
    <h1>💧 Consulta i Turni Idrici</h1>
    <p>Trova gli orari di erogazione idrica nella tua zona</p>
    <div class="search-box">
      <div class="search-row">
        <input class="search-input" type="text" id="q" placeholder="🔍 Cerca via, zona, comune…" oninput="render()">
        <select class="search-select" id="cf" onchange="render()">
          <option value="">Tutti i comuni</option>
        </select>
        <div class="tgroup">
          <button class="tbtn active" id="tb-o" onclick="setMode('oggi')">Oggi</button>
          <button class="tbtn" id="tb-w" onclick="setMode('week')">Settimana</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="content-card">
    <div id="body-content">
      <div class="loader"><div class="spinner"></div>Caricamento turni…</div>
    </div>
    <div class="legenda">
      <div class="leg-item"><div class="leg-dot" style="background:var(--blue)"></div> Schedulato</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div> H24 continuo</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div> Guasto</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--amber)"></div> Sospeso</div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  © 2025 Turni Idrici — Servizio idrico integrato
  <a href="turni_editor_finale.html">Accesso tecnici</a>
</footer>

<script>
// ============================================================
// CONFIG SUPABASE
// ============================================================
const SUPABASE_URL = 'https://myvebxjsmlomroczjbgg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dmVieGpzbWxvbXJvY3pqYmdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTYwODEsImV4cCI6MjA5NDIzMjA4MX0.DB6Ce9zBZA6PceBzG67N3QxnRXNuCf_Fqu01QQCs7RY';
// ============================================================

const { createClient } = supabase;
const DB = createClient(SUPABASE_URL, SUPABASE_KEY);

let comuni = [], serbatoi = [], zone = [], turni = [];
let viewMode = 'oggi';

const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const DAYS_FULL = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const MONTHS_IT = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];

function today() { return new Date().toISOString().slice(0,10); }
function fmtDateIT(d) {
  const dt = typeof d === 'string' ? new Date(d + 'T00:00:00') : d;
  return `${dt.getDate()} ${MONTHS_IT[dt.getMonth()]} ${dt.getFullYear()}`;
}
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  dt.setDate(dt.getDate() - (day === 0 ? 6 : day - 1));
  dt.setHours(0,0,0,0);
  return dt;
}
function addDays(d, n) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() + n);
  return dt;
}
function fmtDate(d) { return d.toISOString().slice(0,10); }

// ============================================================
// BOOT
// ============================================================
async function boot() {
  // Data header
  const now = new Date();
  document.getElementById('hdate').textContent = `${DAYS_FULL[now.getDay()]} ${now.getDate()} ${MONTHS_IT[now.getMonth()]} ${now.getFullYear()}`;

  try {
    const [rc, rs, rz] = await Promise.all([
      DB.from('comuni').select('*').order('nome'),
      DB.from('serbatoi').select('*').order('nome'),
      DB.from('zone').select('*').order('nome_zona'),
    ]);
    if (rc.error) throw rc.error;
    comuni = rc.data; serbatoi = rs.data; zone = rz.data;

    // Popola select comuni
    const sel = document.getElementById('cf');
    comuni.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.nome;
      sel.appendChild(opt);
    });

    await loadTurni();
  } catch(e) {
    document.getElementById('body-content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <p>Errore di connessione. Riprova più tardi.</p>
      </div>`;
  }
}

// ============================================================
// CARICA TURNI
// ============================================================
async function loadTurni() {
  const mon = getMonday(new Date());
  const sun = addDays(mon, 6);
  const { data, error } = await DB.from('turni')
    .select('*')
    .eq('pubblicato', true)
    .gte('data', fmtDate(mon))
    .lte('data', fmtDate(sun))
    .order('data');
  if (error) { console.error(error); return; }
  turni = data;
  render();
}

// ============================================================
// RENDER
// ============================================================
function setMode(m) {
  viewMode = m;
  document.getElementById('tb-o').classList.toggle('active', m === 'oggi');
  document.getElementById('tb-w').classList.toggle('active', m === 'week');
  render();
}

function render() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const comuneFilter = document.getElementById('cf').value;
  const t = today();
  const el = document.getElementById('body-content');

  // Filtra comuni
  let filteredComuni = comuni;
  if (comuneFilter) filteredComuni = comuni.filter(c => String(c.id) === String(comuneFilter));

  // Filtra turni per modalità
  let filteredTurni = turni;
  if (viewMode === 'oggi') filteredTurni = turni.filter(t2 => t2.data === t);

  // Filtra per ricerca testo
  if (q) {
    const matchZone = zone.filter(z =>
      (z.nome_zona||'').toLowerCase().includes(q) ||
      (z.descrizione||'').toLowerCase().includes(q) ||
      (z.codice||'').toLowerCase().includes(q)
    ).map(z => z.id);
    const matchComuni = comuni.filter(c => c.nome.toLowerCase().includes(q)).map(c => c.id);
    const matchSerb = serbatoi.filter(s =>
      s.nome.toLowerCase().includes(q) || matchComuni.includes(s.comune_id)
    ).map(s => s.id);
    const allMatchZone = zone.filter(z => matchZone.includes(z.id) || matchSerb.includes(z.serbatoio_id)).map(z => z.id);
    filteredTurni = filteredTurni.filter(t2 => allMatchZone.includes(t2.zona_id));
    if (matchComuni.length) filteredComuni = filteredComuni.filter(c => matchComuni.includes(c.id) || filteredTurni.some(t2 => {
      const z2 = zone.find(z3 => z3.id === t2.zona_id);
      const s2 = z2 ? serbatoi.find(s3 => s3.id === z2.serbatoio_id) : null;
      return s2 && s2.comune_id === c.id;
    }));
  }

  if (!filteredTurni.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">💧</div>
      <p>${viewMode === 'oggi' ? 'Nessun turno programmato per oggi.' : 'Nessun turno trovato per questa settimana.'}</p>
      ${q ? `<p style="margin-top:8px;font-size:13px">Prova a modificare la ricerca.</p>` : ''}
    </div>`;
    return;
  }

  let html = '';

  if (viewMode === 'oggi') {
    html += `<div class="info-strip">📅 Turni di oggi — ${fmtDateIT(t)}</div>`;
    filteredComuni.forEach(c => {
      const mySerb = serbatoi.filter(s => s.comune_id === c.id);
      const myZoneIds = zone.filter(z => mySerb.map(s=>s.id).includes(z.serbatoio_id)).map(z=>z.id);
      const comuneTurni = filteredTurni.filter(t2 => myZoneIds.includes(t2.zona_id));
      if (!comuneTurni.length) return;

      html += `<div class="comune-section">
        <div class="comune-title">
          <h2>📍 ${c.nome}</h2>
          <span class="comune-badge">${comuneTurni.length} turni oggi</span>
        </div>`;

      mySerb.forEach(s => {
        const sZone = zone.filter(z => z.serbatoio_id === s.id);
        const serbTurni = comuneTurni.filter(t2 => sZone.map(z=>z.id).includes(t2.zona_id));
        if (!serbTurni.length) return;

        html += `<div class="serb-label">📦 ${s.nome}</div><div class="turno-list">`;
        serbTurni.forEach(t2 => {
          const z = zone.find(z2 => z2.id === t2.zona_id);
          const iconMap = {schedulato:'🕐',H24:'🔵',guasto:'🔴',sospeso:'🟡'};
          const orario = t2.tipo === 'schedulato'
            ? (t2.orario ? t2.orario.substring(0,5) + (t2.orario_fine ? '–'+t2.orario_fine.substring(0,5) : '') : '—')
            : t2.tipo.toUpperCase();
          html += `<div class="turno-card">
            <div class="tc-badge ${t2.tipo}">
              <div class="tc-icon">${iconMap[t2.tipo]||'💧'}</div>
              <div>${t2.tipo === 'schedulato' ? 'ORE' : t2.tipo.toUpperCase()}</div>
            </div>
            <div class="tc-info">
              <div class="tc-zona">${z?.nome_zona||'—'}</div>
              <div class="tc-desc">${(z?.descrizione||'').substring(0,70)}${(z?.descrizione||'').length>70?'…':''}</div>
              ${t2.note ? `<div class="tc-note">⚠️ ${t2.note}</div>` : ''}
            </div>
            <div class="tc-right">
              <div class="tc-orario">${orario}</div>
              <span class="pill pill-${t2.tipo}">${t2.tipo}</span>
            </div>
          </div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    });
  } else {
    // VISTA SETTIMANA
    const mon = getMonday(new Date());
    const weekDates = Array.from({length:7}, (_,i) => fmtDate(addDays(mon, i)));
    const todayStr = today();

    filteredComuni.forEach(c => {
      const mySerb = serbatoi.filter(s => s.comune_id === c.id);
      const myZone2 = zone.filter(z => mySerb.map(s=>s.id).includes(z.serbatoio_id));
      const myZoneIds = myZone2.map(z=>z.id);
      const comuneTurni = filteredTurni.filter(t2 => myZoneIds.includes(t2.zona_id));
      if (!comuneTurni.length) return;

      html += `<div class="comune-section">
        <div class="comune-title">
          <h2>📍 ${c.nome}</h2>
        </div>
        <div class="week-grid"><table class="wg-table">
        <thead><tr>
          <th>Zona</th>
          ${weekDates.map((d,i) => {
            const dt = addDays(mon, i);
            return `<th class="${d===todayStr?'th-today':''}">${DAYS_IT[dt.getDay()]}<br><small style="font-weight:400;opacity:.8">${dt.getDate()}/${dt.getMonth()+1}</small></th>`;
          }).join('')}
        </tr></thead><tbody>`;

      mySerb.forEach(s => {
        const sZone = myZone2.filter(z => z.serbatoio_id === s.id);
        const serbTurni = comuneTurni.filter(t2 => sZone.map(z=>z.id).includes(t2.zona_id));
        if (!serbTurni.length) return;

        html += `<tr class="wg-serb-row"><td colspan="8">📦 ${s.nome}</td></tr>`;
        sZone.forEach(z => {
          const zTurni = serbTurni.filter(t2 => t2.zona_id === z.id);
          if (!zTurni.length) return;
          html += `<tr><td title="${z.descrizione||''}">${z.nome_zona}</td>`;
          weekDates.forEach(d => {
            const dt2 = zTurni.find(t2 => t2.data === d);
            const isTod = d === todayStr;
            if (dt2) {
              const colMap = {schedulato:'background:var(--blue-l);color:var(--blue)',H24:'background:var(--green-l);color:var(--green)',guasto:'background:var(--red-l);color:var(--red)',sospeso:'background:var(--amber-l);color:var(--amber)'};
              const label = dt2.tipo === 'schedulato'
                ? (dt2.orario ? dt2.orario.substring(0,5) : 'Sched.')
                : dt2.tipo.toUpperCase();
              html += `<td class="${isTod?'td-today':''}"><span class="wg-chip" style="${colMap[dt2.tipo]||''}">${label}</span></td>`;
            } else {
              html += `<td class="${isTod?'td-today':''}"><span style="color:var(--txt3);font-size:12px">—</span></td>`;
            }
          });
          html += `</tr>`;
        });
      });

      html += `</tbody></table></div></div>`;
    });
  }

  el.innerHTML = html || `<div class="empty"><div class="empty-icon">💧</div><p>Nessun turno trovato.</p></div>`;
}

boot();
</script>
</body>
</html>
